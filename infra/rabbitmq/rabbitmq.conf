## Biashara Copilot — RabbitMQ Broker Configuration
## Optimized for high availability and asynchronous workers

## Disable the guest user from connecting over remote networks 
loopback_users.guest = false

## Standard AMQP port for application microservices connection
listeners.tcp.default = 5672

## Management UI and HTTP API port
management.tcp.port = 15672

log.console = true
log.console.level = info

## Resource Management & Flow Control 
## Allow RabbitMQ to utilize up to 60% of the host RAM before triggering flow control
vm_memory_high_watermark.relative = 0.6

## Block publishers if the host disk space drops below 1GB to prevent database corruption
disk_free_limit.absolute = 1GB